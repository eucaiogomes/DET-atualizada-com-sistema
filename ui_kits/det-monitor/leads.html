/* ---------- map DB row to UI lead shape (matches public.leads) ---------- */
function mapRow(row) {
  const created = row.created_at || row.updated_at || new Date().toISOString();
  return {
    id: row.id,
    name: row.name || 'Sem nome',
    office: row.office || '',
    email: row.email || '',
    phone: row.phone || '',
    cnpjs: row.cnpjs || '',
    message: row.message || '',
    consent: !!row.consent,
    source: row.source || 'Formulário',
    createdAt: created,
    status: row.status || 'novo',
    notes: row.notes || ''
  };
}

async function loadLeadsFromSupabase() {
  if (!supabaseClient) {
    // Demo fallback when running without Supabase (for local preview)
    return SEED_FALLBACK;
  }
  try {
    const { data, error } = await supabaseClient
      .from('leads')
      .select('*')
      .order('created_at', { ascending: false });
    if (error) throw error;
    return (data || []).map(mapRow);
  } catch (e) {
    console.error('Erro ao carregar leads do Supabase:', e);
    return SEED_FALLBACK; // graceful fallback
  }
}

async function updateLeadInSupabase(id, patch) {
  if (!supabaseClient) return { error: 'no-client' };
  try {
    const { error } = await supabaseClient
      .from('leads')
      .update({ ...patch, updated_at: new Date().toISOString() })
      .eq('id', id);
    return { error };
  } catch (e) {
    return { error: e };
  }
}

const STORE = 'juris8_leads_v1';

const fmtDate = (iso) => {
  const d = new Date(iso);
  return d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' }) + ' · ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
};
const rel = (iso) => {
  const mins = Math.round((Date.now() - new Date(iso)) / 60000);
  if (mins < 1) return 'agora';
  if (mins < 60) return mins + 'min';
  const h = Math.round(mins / 60);
  if (h < 24) return h + 'h';
  const dd = Math.round(h / 24);
  return dd + 'd';
};

/* ---------- app ---------- */
function App() {
  const [leads, setLeads] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState('todos');
  const [query, setQuery] = useState('');
  const [selId, setSelId] = useState(null);
  const [localNotes, setLocalNotes] = useState({}); // fallback for notes if column not present

  // Load leads from Supabase on mount
  useEffect(() => {
    let mounted = true;
    (async () => {
      setLoading(true);
      const data = await loadLeadsFromSupabase();
      if (mounted) {
        setLeads(data);
        if (data.length > 0 && !selId) {
          setSelId(data[0].id);
        }
        setLoading(false);
      }
    })();
    return () => { mounted = false; };
  }, []);

  // Keep selection valid
  useEffect(() => {
    if (selId && !leads.find(l => l.id === selId) && leads.length > 0) {
      setSelId(leads[0].id);
    }
  }, [leads, selId]);

  // Persist notes locally as backup (DB preferred)
  useEffect(() => {
    try {
      const saved = JSON.parse(localStorage.getItem(STORE) || '{}');
      if (saved.notes) setLocalNotes(saved.notes);
    } catch (e) {}
  }, []);
  useEffect(() => {
    try {
      localStorage.setItem(STORE, JSON.stringify({ notes: localNotes, selId }));
    } catch (e) {}
  }, [localNotes, selId]);

  const reload = async () => {
    setLoading(true);
    const data = await loadLeadsFromSupabase();
    setLeads(data);
    if (data.length > 0 && (!selId || !data.find(l => l.id === selId))) {
      setSelId(data[0].id);
    }
    setLoading(false);
  };

  const setStatus = async (id, status) => {
    // optimistic
    setLeads(ls => ls.map(l => l.id === id ? { ...l, status } : l));

    const { error } = await updateLeadInSupabase(id, { status });
    if (error) {
      console.error('Falha ao atualizar status no Supabase', error);
      // optional: could revert but for now keep optimistic
    }
  };

  const setNote = async (id, v) => {
    // update local backup + DB
    setLocalNotes(n => ({ ...n, [id]: v }));

    // also update the lead object notes for UI
    setLeads(ls => ls.map(l => l.id === id ? { ...l, notes: v } : l));

    const { error } = await updateLeadInSupabase(id, { notes: v });
    if (error) {
      console.warn('Não foi possível salvar nota no Supabase (talvez coluna notes não exista ainda):', error);
    }
  };

  const counts = useMemo(() => {
    const c = { todos: leads.length };
    PIPELINE.forEach((k) => c[k] = leads.filter((l) => l.status === k).length);
    return c;
  }, [leads]);

  const visible = useMemo(() => {
    const q = query.trim().toLowerCase();
    return leads
      .filter((l) => filter === 'todos' ? true : l.status === filter)
      .filter((l) => !q || (l.name + ' ' + l.office + ' ' + l.email).toLowerCase().includes(q))
      .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
  }, [leads, filter, query]);

  const selected = leads.find((l) => l.id === selId) || null;

  const CHIPS = [
    { k: 'todos', label: 'Todos' },
    { k: 'novo', label: 'Novos' },
    { k: 'contato', label: 'Em contato' },
    { k: 'qualificado', label: 'Qualificados' },
    { k: 'ganho', label: 'Ganhos' },
    { k: 'perdido', label: 'Perdidos' },
  ];

  return (
    <div style={{ display: 'flex', height: '100vh' }}>
      <Rail leadCount={counts.novo} />
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
        {/* topbar */}
        <header style={{ display: 'flex', alignItems: 'center', gap: 16, padding: '0 24px', minHeight: 60, flexShrink: 0, borderBottom: '1px solid var(--hairline)', background: 'rgba(13,11,28,0.6)', backdropFilter: 'blur(12px)' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.1em', color: 'var(--dim)' }}>Juris8</span>
            <Icon n="chevR" s={12} c="var(--dim)" />
            <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.1em', color: 'var(--ink-200)' }}>Caixa de Leads</span>
            {!supabaseClient && <span style={{ fontSize: 9, marginLeft: 8, color: 'var(--warn)', opacity: .8 }}>(modo demo)</span>}
          </div>
          <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 8, padding: '0 12px', height: 36, borderRadius: 'var(--r-3)', width: 280, background: 'var(--surface-2)', border: '1px solid var(--hairline-strong)' }}>
            <Icon n="search" s={14} c="var(--dim)" />
            <input value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Buscar nome, escritório ou e-mail…"
              style={{ flex: 1, background: 'transparent', border: 'none', outline: 'none', color: 'var(--text)', fontSize: 12.5, fontFamily: 'var(--font-sans)' }} />
          </div>
          <Badge tone="brand" dot>{counts.novo} novos</Badge>
          <button onClick={reload} disabled={loading} style={{
            marginLeft: 8, fontSize: 11, padding: '6px 12px', borderRadius: 8,
            border: '1px solid var(--hairline-strong)', background: 'var(--surface-2)',
            color: 'var(--muted)', cursor: loading ? 'default' : 'pointer'
          }}>↻ Recarregar</button>
        </header>

        {/* body: list + detail */}
        <div style={{ flex: 1, display: 'flex', minHeight: 0 }}>
          {/* list column */}
          <div style={{ flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column' }}>
            {/* metrics */}
            <div style={{ padding: '18px 24px 0', display: 'grid', gridTemplateColumns: 'repeat(auto-fit,minmax(108px,1fr))', gap: 10 }}>
              <Stat value={counts.novo} label="Novos leads" tone="brand" />
              <Stat value={counts.contato} label="Em contato" />
              <Stat value={counts.qualificado} label="Qualificados" tone="warn" />
              <Stat value={counts.ganho} label="Ganhos" tone="ok" />
            </div>

            {/* filter chips — single scrollable row */}
            <div className="chiprow" style={{ display: 'flex', gap: 7, padding: '16px 24px 12px', overflowX: 'auto' }}>
              {CHIPS.map((c) => {
                const on = filter === c.k;
                return (
                  <button key={c.k} onClick={() => setFilter(c.k)} style={{
                    flexShrink: 0,
                    fontFamily: 'var(--font-mono)', fontSize: 10.5, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.05em',
                    padding: '6px 12px', borderRadius: 'var(--r-full)', cursor: 'pointer',
                    border: `1px solid ${on ? 'var(--border-brand)' : 'var(--hairline-strong)'}`,
                    background: on ? 'var(--fill-brand-strong)' : 'transparent',
                    color: on ? 'var(--juris-200)' : 'var(--muted)', transition: 'all 0.13s',
                  }}>{c.label} <span style={{ opacity: 0.55, marginLeft: 1 }}>{counts[c.k] ?? 0}</span></button>
                );
              })}
            </div>

            {/* rows */}
            <div style={{ flex: 1, overflowY: 'auto', overflowX: 'hidden', padding: '0 14px 24px', display: 'flex', flexDirection: 'column', gap: 2 }}>
              {loading ? (
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', flex: 1, color: 'var(--dim)', gap: 10 }}>
                  <span style={{ fontFamily: 'var(--font-mono)', fontSize: 12 }}>Carregando leads do Supabase…</span>
                </div>
              ) : visible.length === 0 ? (
                <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', flex: 1, gap: 10, color: 'var(--dim)', padding: 40 }}>
                  <Icon n="inbox" s={26} sw={1.4} />
                  <span style={{ fontSize: 13 }}>Nenhum lead neste filtro.</span>
                </div>
              ) : visible.map((l) => (
                <Row key={l.id} lead={l} active={l.id === selId} onClick={() => setSelId(l.id)} />
              ))}
            </div>
          </div>

          {/* detail */}
          <Detail lead={selected} onStatus={setStatus} note={(selected && (selected.notes || localNotes[selected.id])) || ''} onNote={setNote} />
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
