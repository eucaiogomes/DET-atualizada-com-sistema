<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Juris8 DET Monitor — UI Kit</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="det-icons.js"></script>
<style>
  html, body { height: 100%; margin: 0; }
  #root { height: 100vh; }
  .crumbtabs { display: flex; gap: 6px; }
</style>
</head>
<body class="juris-ambient">
<div id="root"></div>

<script type="text/babel" src="Sidebar.jsx"></script>
<script type="text/babel" src="Topbar.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>
<script type="text/babel" src="CertConfig.jsx"></script>
<script type="text/babel" src="Marketing.jsx"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

function App() {
  // view: 'landing' | 'app'
  const [view, setView] = useState('landing');
  const [active, setActive] = useState('dashboard');

  const crumbs = {
    dashboard: 'Dashboard', certificado: 'Certificado',
    clientes: 'Clientes', monitoramento: 'Monitoramento', cnpjs: 'CNPJs',
    comissoes: 'Comissões', config: 'Configurações',
  };

  if (view === 'landing') {
    return <window.Marketing onEnter={() => { setView('app'); setActive('dashboard'); }} />;
  }

  let screen;
  if (active === 'certificado') screen = <window.CertConfig />;
  else if (active === 'dashboard' || active === 'monitoramento') screen = <window.Dashboard />;
  else screen = <Placeholder label={crumbs[active]} onBack={() => setActive('dashboard')} />;

  return (
    <div style={{ display: 'flex', height: '100vh' }}>
      <window.Sidebar active={active} onNavigate={setActive} />
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
        <window.Topbar crumb={crumbs[active]} />
        {screen}
      </div>
    </div>
  );
}

function Placeholder({ label, onBack }) {
  const { Button } = window.Juris8DesignSystem_75d483;
  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 14, color: 'var(--muted)' }}>
      <window.DetIcon name="construction" size={30} sw={1.5} />
      <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.1em' }}>{label}</span>
      <p style={{ fontSize: 13, maxWidth: '36ch', textAlign: 'center', color: 'var(--ink-400)' }}>Tela ilustrativa. Abra <b style={{ color: 'var(--ink-200)' }}>Dashboard</b> ou <b style={{ color: 'var(--ink-200)' }}>Certificado</b> para a demo interativa.</p>
      <Button variant="secondary" size="sm" onClick={onBack}>Ir para o Dashboard</Button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
